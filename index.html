<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SCANFREAK AR V2 - PARALLAX</title>
    
    <link rel="icon" type="image/png" href="assets/scanfreakblanklogo.png">
    <link rel="apple-touch-icon" href="assets/scanfreakblanklogo.png">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

    <script>
        AFRAME.registerComponent('hider-material', {
            init: function () {
                this.el.addEventListener('model-loaded', () => {
                    const mesh = this.el.getObject3D('mesh');
                    if (mesh) {
                        mesh.material.colorWrite = false;
                        mesh.renderOrder = 0; // Forces hider planes to render before the parallax layers
                    }
                });
                // Fallback for simple primitives
                const mesh = this.el.getObject3D('mesh');
                if (mesh) {
                    mesh.material.colorWrite = false;
                    mesh.renderOrder = 0;
                }
            }
        });
    </script>
    
    <style>
        /* (PASTE YOUR EXACT CSS FROM V1.0 HERE - Lines 13 through 244) */
        /* I am omitting the 200 lines of CSS here for brevity, but you must keep your exact v1.0 CSS block */
    </style>
</head>
<body>

    <img id="easter-egg-img" src="assets/dev.png" alt="dev">
    <div id="flash-overlay"></div>

    <div id="scanner-ui">
        <div class="corner top-left"></div>
        <div class="corner top-right"></div>
        <div class="corner bottom-left"></div>
        <div class="corner bottom-right"></div>
        <div class="scan-line"></div>
    </div>

    <div id="start-screen">
        <div class="logo-wrapper" id="logo-container">
            <img src="assets/scanfreakblanklogo.png" class="logo-image" id="main-logo" alt="SCANFREAK AR">
        </div>
        <div id="loading-container"><div id="loading-bar"></div></div>
        <button id="start-btn">PRESS START</button>
    </div>

    <div id="info-btn" class="btn-ui"><img src="assets/infoicon.png" class="ui-icon"></div>
    <div id="flash-btn" class="btn-ui"><img src="assets/flashicon.png" class="ui-icon"></div>
    <div id="share-btn" class="btn-ui"><img src="assets/shareicon.png" class="ui-icon"></div>
    <div id="cta-btn" class="btn-ui"><img src="assets/storeicon.png" class="ui-icon"></div>
    <div id="help-btn" class="btn-ui"><img src="assets/helpicon.png" class="ui-icon"></div>
    <div id="screenshot-btn" class="btn-ui"><img src="assets/screenshoticon.png" class="ui-icon"></div>
    <div id="record-btn" class="btn-ui"><img src="assets/recordicon.png" class="ui-icon"></div>

    <div id="rec-timer">REC: 00:00</div>
    <div id="zoom-display">ZOOM: 1.0x</div>

    <div id="help-message" class="msg-box normal-font">Scanner not loading? Pause your VPN, Adblocker or use link above in a default browser.</div>
    <div id="info-message" class="msg-box normal-font">Welcome Freaks<br>POINT SCAN DISCOVER!</div>
    <div id="flash-error-message" class="msg-box normal-font" style="width: auto; padding: 15px;">flash unavailable</div>
    
    <div id="overlay">
        <span class="marquee-text">Point camera at the SCANFREAK design!</span>
    </div>

    <a-scene id="ar-scene"
        mindar-image="imageTargetSrc: descriptors/test/cyberpunk.mind; filterMinCF: 0.0001; filterBeta: 0.001; missTolerance: 5; uiScanning: no" 
        color-space="sRGB" 
        renderer="colorManagement: true, physicallyCorrectLights: true, preserveDrawingBuffer: true, antialias: false, alpha: true" 
        vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false" embedded>

        <a-assets>
            <audio id="sfx-start" src="assets/sfx/start.mp3" preload="auto"></audio>
            <img id="l1" src="parallax/layer1_frame.png">
            <img id="l2" src="parallax/layer2_car.png">
            <img id="l3" src="parallax/layer3_signs.png">
            <img id="l4" src="parallax/layer4_buildings.png">
            
            <video id="l5-vid" src="videos/layer5_rain.mp4" loop crossorigin="anonymous" playsinline></video>
        </a-assets>

        <a-entity mindar-image-target="targetIndex: 0" id="target-0">
            
            <a-entity id="occlusion-walls">
                <a-plane position="0 0.888 0" width="2" height="1" rotation="90 0 0" hider-material></a-plane>
                <a-plane position="0 -0.888 0" width="2" height="1" rotation="-90 0 0" hider-material></a-plane>
                <a-plane position="-0.5 0 0" width="1" height="3" rotation="0 90 0" hider-material></a-plane>
                <a-plane position="0.5 0 0" width="1" height="3" rotation="0 -90 0" hider-material></a-plane>
            </a-entity>

            <a-plane src="#l1" width="1" height="1.777" position="0 0 0" transparent="true" material="shader: flat; alphaTest: 0.5"></a-plane>
            
            <a-plane src="#l2" width="1.2" height="2.13" position="0 0 -0.15" transparent="true" material="shader: flat"></a-plane>
            
            <a-plane src="#l3" width="1.4" height="2.48" position="0 0 -0.3" transparent="true" material="shader: flat"></a-plane>
            
            <a-plane src="#l4" width="1.6" height="2.84" position="0 0 -0.45" transparent="true" material="shader: flat"></a-plane>
            
            <a-video src="#l5-vid" width="1.8" height="3.2" position="0 0 -0.6"></a-video>

        </a-entity>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
    </a-scene>

    <script>
        // (PASTE YOUR V1.0 VARIABLES AND UI CONSTANTS HERE)
        const sceneEl = document.querySelector('a-scene');
        const overlay = document.getElementById('overlay');
        const scannerUi = document.getElementById('scanner-ui');
        // ... include all your button definitions ...

        const target = document.querySelector('#target-0');
        const video = document.querySelector('#l5-vid');

        target.addEventListener('targetFound', () => {
            // Trigger haptics and hide UI just like v1.0
            if (navigator.vibrate) navigator.vibrate(50);
            overlay.classList.remove('visible'); 
            scannerUi.classList.remove('visible');
            // Show record/screenshot buttons
            document.getElementById('screenshot-btn').classList.add('visible');
            
            // Play video background
            video.play().catch(e => console.log("Video play error:", e));
        });

        target.addEventListener('targetLost', () => {
            // Show UI and pause video
            overlay.classList.add('visible'); 
            scannerUi.classList.add('visible');
            document.getElementById('screenshot-btn').classList.remove('visible');
            video.pause();
        });

        // (PASTE YOUR V1.0 START BUTTON AND EASTER EGG LOGIC HERE)
    </script>
</body>
</html>

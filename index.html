<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SCANFREAK AR V2.10 - LAYER PHYSICS & MASSIVE FRAME</title>
    
    <link rel="icon" type="image/png" href="assets/scanfreakblanklogo.png">
    <link rel="apple-touch-icon" href="assets/scanfreakblanklogo.png">
    <meta property="og:image" content="assets/scanfreakblanklogo.png">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

    <script>
        // Occlusion Mask Component
        AFRAME.registerComponent('hider-material', {
            init: function () {
                const setHider = (mesh) => {
                    if (!mesh) return;
                    mesh.material.colorWrite = false;
                    mesh.material.depthWrite = true;
                    mesh.material.side = THREE.DoubleSide; 
                    mesh.renderOrder = -1; 
                };
                setHider(this.el.getObject3D('mesh'));
                this.el.addEventListener('object3dset', (e) => {
                    if (e.detail.type === 'mesh') {
                        setHider(this.el.getObject3D('mesh'));
                    }
                });
            }
        });

        // TWEAK 2: Circular Motion Physics Engine for Layer 4
        AFRAME.registerComponent('circular-motion', {
            schema: { radius: {type: 'number', default: 0.04}, speed: {type: 'number', default: 0.0015} },
            init: function() { 
                this.time = 0; 
                this.baseX = this.el.object3D.position.x; 
                this.baseY = this.el.object3D.position.y; 
            },
            tick: function(t, dt) {
                this.time += dt * this.data.speed;
                this.el.object3D.position.x = this.baseX + Math.cos(this.time) * this.data.radius;
                this.el.object3D.position.y = this.baseY + Math.sin(this.time) * this.data.radius;
            }
        });

        // TWEAK 3: Glitch Bob Physics Engine for Layer 5
        AFRAME.registerComponent('glitch-bob', {
            schema: { bobSpeed: {type: 'number', default: 0.002}, bobHeight: {type: 'number', default: 0.06}, glitchIntensity: {type: 'number', default: 0.04} },
            init: function() {
                this.time = 0;
                this.baseX = this.el.object3D.position.x;
                this.baseY = this.el.object3D.position.y;
            },
            tick: function(t, dt) {
                this.time += dt * this.data.bobSpeed;
                let newY = this.baseY + Math.sin(this.time) * this.data.bobHeight;
                let newX = this.baseX;

                // 10% chance per frame to violently jerk coordinates
                if (Math.random() < 0.10) {
                    newX += (Math.random() - 0.5) * this.data.glitchIntensity;
                    newY += (Math.random() - 0.5) * this.data.glitchIntensity;
                }

                this.el.object3D.position.set(newX, newY, this.el.object3D.position.z);
            }
        });
    </script>
    
    <style>
        html, body { width: 100%; height: 100%; margin: 0; overflow: hidden; -webkit-tap-highlight-color: transparent; touch-action: none; }
        a-scene { position: fixed !important; top: 0; left: 0; width: 100vw !important; height: 100vh !important; }

        #start-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.9); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 30; transition: opacity 0.5s, visibility 0.5s; user-select: none; }
        #start-screen.hidden { opacity: 0; visibility: hidden; pointer-events: none; }

        .logo-wrapper { position: relative; overflow: hidden; display: flex; justify-content: center; align-items: center; width: 70vw; height: 70vw; max-width: 300px; max-height: 300px; margin-bottom: 20px; }
        .logo-image { max-width: 90%; max-height: 90%; object-fit: contain; display: block; opacity: 1; }
        .animate-logo { animation: fadeOut 3s ease-in-out forwards; }
        .logo-wrapper::after { content: ""; position: absolute; top: -150%; left: -150%; width: 100%; height: 400%; background: linear-gradient(135deg, transparent, rgba(255,255,255,0.7), transparent); transform: rotate(25deg); }
        .animate-sweep::after { animation: sweep 1.2s ease-in-out forwards; }
        @keyframes sweep { 100% { top: 100%; left: 100%; } }
        @keyframes fadeOut { 0%, 70% { opacity: 1; transform: scale(1); } 100% { opacity: 0; transform: scale(0.95); } }

        #loading-container { width: 200px; height: 4px; background: rgba(255, 255, 255, 0.1); margin-top: 20px; border-radius: 10px; position: relative; overflow: hidden; border: 1px solid rgba(255, 255, 255, 0.2); }
        #loading-bar { width: 40%; height: 100%; background: #ffffff; position: absolute; left: -40%; border-radius: 10px; animation: loadingMove 1.5s infinite ease-in-out; box-shadow: 0 0 10px #fff; }
        @keyframes loadingMove { 0% { left: -40%; } 50% { left: 100%; } 100% { left: -40%; } }

        #start-btn { font-family: 'Press Start 2P', cursive; padding: 15px 15px; font-size: 15px; color: black; background: white; border: 4px solid #555; border-radius: 15px; cursor: pointer; text-transform: uppercase; box-shadow: 4px 4px 0px #888; opacity: 0; pointer-events: none; transition: opacity 0.8s ease-in; position: absolute; margin-top: 30px; }
        #start-btn.visible { opacity: 1; pointer-events: auto; animation: pulseBtn 1.5s infinite; }
        @keyframes pulseBtn { 0% { transform: translateY(-50%) scale(1); } 50% { transform: translateY(-50%) scale(1.08); box-shadow: 0 0 15px rgba(255,255,255,0.4); } 100% { transform: translateY(-50%) scale(1); } }
        #start-btn:active { transform: translateY(-50%) translate(4px, 4px); box-shadow: none; }

        #scanner-ui { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 60vw; height: 60vw; max-width: 320px; max-height: 320px; border: 2px solid rgba(255, 255, 255, 0); z-index: 5; pointer-events: none; opacity: 0; transition: opacity 0.5s; }
        #scanner-ui.visible { opacity: 1; }
        .corner { position: absolute; width: 30px; height: 30px; border: 8px solid white; }
        .top-left { top: -4px; left: -4px; border-right: none; border-bottom: none; }
        .top-right { top: -4px; right: -4px; border-left: none; border-bottom: none; }
        .bottom-left { bottom: -4px; left: -4px; border-right: none; border-top: none; }
        .bottom-right { bottom: -4px; right: -4px; border-left: none; border-top: none; }
        .scan-line { position: absolute; width: 100%; height: 8px; background: white; top: 0; left: 0; box-shadow: 0 0 20px white; animation: scanMove 2.0s ease-in-out infinite; }
        @keyframes scanMove { 0%, 100% { top: 5%; opacity: 0.3; } 50% { top: 95%; opacity: 1; } }

        #overlay { position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); width: 80%; max-width: 400px; padding: 12px 0; color: white; font-size: 18px; font-family: Arial, sans-serif; text-shadow: 2px 2px 4px black; background: rgba(0, 0, 0, 0.6); border-radius: 12px; z-index: 10; transition: opacity 0.5s; pointer-events: none; opacity: 0; overflow: hidden; white-space: nowrap; }
        #overlay.visible { opacity: 1; }
        .marquee-text { display: inline-block; padding-left: 100%; animation: scroll-left 6.4s linear infinite; }
        @keyframes scroll-left { 0% { transform: translateX(0); } 100% { transform: translateX(-100%); } }

        .btn-ui { position: absolute; width: 36px; height: 36px; right: 15px; background: rgba(0, 0, 0, 0.4); color: white; border: 2px solid white; border-radius: 10px; display: flex; justify-content: center; align-items: center; cursor: pointer; z-index: 50; transition: opacity 0.5s; opacity: 0; pointer-events: none; overflow: hidden; }
        .btn-ui.visible { opacity: 1; pointer-events: auto !important; }
        #info-btn { top: 15px; } #flash-btn { top: 60px; } #share-btn { top: 105px; } #cta-btn { top: 150px; } #help-btn { top: 195px; }
        #screenshot-btn { position: absolute; bottom: 30px; left: 50%; transform: translateX(-110%); width: 60px; height: 60px; border-radius: 15px; z-index: 20; display: none; }
        #screenshot-btn.visible { display: flex; opacity: 1; pointer-events: auto; }
        #record-btn { position: absolute; bottom: 30px; left: 15px; width: 60px; height: 60px; border-radius: 15px; z-index: 20; display: none; }
        #record-btn.visible { display: flex; opacity: 1; pointer-events: auto; }
        .ui-icon { width: 70%; height: 70%; object-fit: contain; }

        /* Gesture Feedback */
        #gesture-feedback { position: absolute; top: 15px; left: 15px; color: #00ff00; font-family: 'Press Start 2P', cursive; font-size: 10px; z-index: 99; opacity: 0; transition: opacity 0.3s; text-shadow: 1px 1px 2px black; pointer-events: none; }
    </style>
</head>
<body>

    <div id="gesture-feedback">WILDCARD UNLOCKED</div>

    <div id="scanner-ui">
        <div class="corner top-left"></div>
        <div class="corner top-right"></div>
        <div class="corner bottom-left"></div>
        <div class="corner bottom-right"></div>
        <div class="scan-line"></div>
    </div>

    <div id="start-screen">
        <div class="logo-wrapper" id="logo-container">
            <img src="assets/scanfreakblanklogo.png" class="logo-image" id="main-logo" alt="SCANFREAK AR">
        </div>
        <div id="loading-container"><div id="loading-bar"></div></div>
        <button id="start-btn">PRESS START</button>
    </div>

    <div id="info-btn" class="btn-ui"><img src="assets/infoicon.png" class="ui-icon"></div>
    <div id="flash-btn" class="btn-ui"><img src="assets/flashicon.png" class="ui-icon"></div>
    <div id="share-btn" class="btn-ui"><img src="assets/shareicon.png" class="ui-icon"></div>
    <div id="cta-btn" class="btn-ui"><img src="assets/storeicon.png" class="ui-icon"></div>
    <div id="help-btn" class="btn-ui"><img src="assets/helpicon.png" class="ui-icon"></div>
    <div id="screenshot-btn" class="btn-ui"><img src="assets/screenshoticon.png" class="ui-icon"></div>
    <div id="record-btn" class="btn-ui"><img src="assets/recordicon.png" class="ui-icon"></div>

    <div id="overlay">
        <span class="marquee-text">Point camera at the SCANFREAK design!</span>
    </div>

    <a-scene id="ar-scene"
        mindar-image="imageTargetSrc: descriptors/collection02/cyberpunk.mind; filterMinCF: 0.0001; filterBeta: 0.001; missTolerance: 5; uiScanning: no" 
        color-space="sRGB" 
        renderer="colorManagement: true, physicallyCorrectLights: true, preserveDrawingBuffer: true, antialias: false, alpha: true" 
        vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false" embedded>

        <a-assets>
            <audio id="sfx-start" src="assets/sfx/start.mp3" preload="auto"></audio>
            <audio id="sfx-startup" src="assets/sfx/startup.mp3" preload="auto"></audio>
        </a-assets>

        <script>
            for(let i=0; i<=23; i++) {
                document.write(`
                <a-entity mindar-image-target="targetIndex: ${i}" id="target-${i}">
                    <a-entity id="occlusion-mask-${i}" position="0 0 0.01">
                        <a-plane position="0 25.888 0" width="50" height="50" hider-material></a-plane>
                        <a-plane position="0 -25.888 0" width="50" height="50" hider-material></a-plane>
                        <a-plane position="-25.5 0 0" width="50" height="1.777" hider-material></a-plane>
                        <a-plane position="25.5 0 0" width="50" height="1.777" hider-material></a-plane>
                    </a-entity>
                    
                    <a-plane class="l1" width="1.0" height="1.777" position="0 0 0.02" transparent="true" material="shader: flat; alphaTest: 0.5" visible="false"></a-plane>
                    <a-plane class="l2" width="1.8" height="3.20" position="0 0 -1.30" transparent="true" material="shader: flat; alphaTest: 0.5" visible="false"></a-plane>
                    <a-plane class="l3" width="2.0" height="3.55" position="0 0 -1.60" transparent="true" material="shader: flat; alphaTest: 0.5" visible="false"></a-plane>
                    <a-plane class="l4" width="2.2" height="3.91" position="0 0 -1.90" transparent="true" material="shader: flat; alphaTest: 0.5" visible="false"></a-plane>
                    <a-plane class="l5" width="2.4" height="4.26" position="0 0 -2.20" transparent="true" material="shader: flat; alphaTest: 0.5" visible="false"></a-plane>
                    <a-plane class="l6" width="2.6" height="4.62" position="0 0 -2.50" transparent="true" material="shader: flat; alphaTest: 0.5" visible="false"></a-plane>
                    
                    <a-plane class="l7-frame" width="11.2" height="19.88" position="0 0 -2.82" transparent="true" material="shader: flat; alphaTest: 0.5" visible="false"></a-plane>
                    
                    <a-plane class="l7" width="2.8" height="4.97" position="0 0 -2.80" transparent="true" material="shader: flat; side: double" visible="false"></a-plane>
                    
                    <a-plane class="wildcard-layer" width="2.75" height="4.88" position="0 0 0" transparent="true" material="shader: flat; side: double" visible="false"></a-plane>
                </a-entity>`);
            }
        </script>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
    </a-scene>

    <script>
        // --- BASE MAPPING ---
        // Added l4Anim and l5Anim config to Cyberpunk to activate the new physics components
        const BASE_DATA = [
            { name: 'cyberpunk', id: '01', folder: 'cyberpunk layers', wildcardPrefix: 'cyber', count: 10, wildcardZ: -2.75, l3AnimType: 'slideLeft', l3Idle: 'hover', l4Anim: 'circular', l5Anim: 'glitchBob' },
            { name: 'placeholder2', id: '02', folder: 'design2', wildcardPrefix: 'des2', count: 10, wildcardZ: -2.75, l3AnimType: 'zoomIn', l3Idle: 'none', l4Anim: 'none', l5Anim: 'none' },
            { name: 'placeholder3', id: '03', folder: 'design3', wildcardPrefix: 'des3', count: 10, wildcardZ: -2.75, l3AnimType: 'slideLeft', l3Idle: 'none', l4Anim: 'none', l5Anim: 'none' },
            { name: 'placeholder4', id: '04', folder: 'design4', wildcardPrefix: 'des4', count: 10, wildcardZ: -2.75, l3AnimType: 'none', l3Idle: 'none', l4Anim: 'none', l5Anim: 'none' },
            { name: 'placeholder5', id: '05', folder: 'design5', wildcardPrefix: 'des5', count: 10, wildcardZ: -2.75, l3AnimType: 'none', l3Idle: 'none', l4Anim: 'none', l5Anim: 'none' },
            { name: 'placeholder6', id: '06', folder: 'design6', wildcardPrefix: 'des6', count: 10, wildcardZ: -2.75, l3AnimType: 'none', l3Idle: 'none', l4Anim: 'none', l5Anim: 'none' },
            { name: 'placeholder7', id: '07', folder: 'design7', wildcardPrefix: 'des7', count: 10, wildcardZ: -2.75, l3AnimType: 'none', l3Idle: 'none', l4Anim: 'none', l5Anim: 'none' },
            { name: 'placeholder8', id: '08', folder: 'design8', wildcardPrefix: 'des8', count: 10, wildcardZ: -2.75, l3AnimType: 'none', l3Idle: 'none', l4Anim: 'none', l5Anim: 'none' },
            { name: 'placeholder9', id: '09', folder: 'design9', wildcardPrefix: 'des9', count: 10, wildcardZ: -2.75, l3AnimType: 'none', l3Idle: 'none', l4Anim: 'none', l5Anim: 'none' },
            { name: 'placeholder10', id: '10', folder: 'design10', wildcardPrefix: 'des10', count: 10, wildcardZ: -2.75, l3AnimType: 'none', l3Idle: 'none', l4Anim: 'none', l5Anim: 'none' },
            { name: 'placeholder11', id: '11', folder: 'design11', wildcardPrefix: 'des11', count: 10, wildcardZ: -2.75, l3AnimType: 'none', l3Idle: 'none', l4Anim: 'none', l5Anim: 'none' },
            { name: 'placeholder12', id: '12', folder: 'design12', wildcardPrefix: 'des12', count: 10, wildcardZ: -2.75, l3AnimType: 'none', l3Idle: 'none', l4Anim: 'none', l5Anim: 'none' }
        ];

        const COLLECTION_DATA = {};
        BASE_DATA.forEach((data, index) => { 
            COLLECTION_DATA[index] = data; 
            COLLECTION_DATA[index + 12] = data; 
        });

        const sceneEl = document.querySelector('a-scene');
        const startScreen = document.getElementById('start-screen');
        const startBtn = document.getElementById('start-btn');
        const scannerUi = document.getElementById('scanner-ui');
        const overlay = document.getElementById('overlay');
        const sfxStart = document.getElementById('sfx-start');
        const sfxStartup = document.getElementById('sfx-startup');
        
        let isStarted = false;
        let activeTargetIndex = null;
        let activeLayer7Video = null;
        let activeWildcardVideo = null;
        let activeWildcardPlane = null;
        let isWildcardSequenceRunning = false;

        const videoPool = {}; 
        const wildcardPool = {};

        const setupTarget = (index) => {
            const data = COLLECTION_DATA[index];
            const targetEl = document.querySelector(`#target-${index}`);
            if (!targetEl) return;

            for(let l=1; l<=6; l++) {
                const plane = targetEl.querySelector(`.l${l}`);
                plane.setAttribute('src', `parallax/${data.folder}/layer${l}_${data.id}.png`);
            }

            const framePlane = targetEl.querySelector('.l7-frame');
            framePlane.setAttribute('src', `parallax/${data.folder}/layer7_frame_${data.id}.png`);

            const l7Plane = targetEl.querySelector('.l7');
            const l7Vid = document.createElement('video');
            l7Vid.crossOrigin = "anonymous"; l7Vid.loop = true; l7Vid.preload = "auto";
            l7Vid.setAttribute('playsinline', ''); l7Vid.style.display = 'none';
            l7Vid.src = `parallax/${data.folder}/layer7_${data.id}.mp4`;
            document.body.appendChild(l7Vid);
            videoPool[index] = l7Vid;

            const wildcardPlane = targetEl.querySelector('.wildcard-layer');
            const wildcardVid = document.createElement('video');
            wildcardVid.crossOrigin = "anonymous"; wildcardVid.loop = false; wildcardVid.preload = "auto";
            wildcardVid.setAttribute('playsinline', ''); wildcardVid.style.display = 'none';
            document.body.appendChild(wildcardVid);
            wildcardPool[index] = wildcardVid;

            wildcardVid.addEventListener('ended', () => {
                wildcardPlane.setAttribute('visible', false);
                isWildcardSequenceRunning = false;
                
                if (activeLayer7Video) activeLayer7Video.muted = false;

                const l3Plane = targetEl.querySelector('.l3');
                if (data.l3AnimType === 'slideLeft') {
                    l3Plane.setAttribute('animation', 'property: position; from: 3.5 0 -1.60; to: 0 0 -1.60; dur: 800; easing: easeInOutQuad');
                } else if (data.l3AnimType === 'zoomIn') {
                    l3Plane.setAttribute('animation', 'property: scale; to: 1 1 1; dur: 800; easing: easeInOutQuad');
                }

                setTimeout(() => {
                    if (activeTargetIndex === index && data.l3Idle === 'hover') {
                        l3Plane.setAttribute('animation__hover', 'property: position; from: 0 0 -1.60; to: 0 0.15 -1.60; dir: alternate; dur: 1200; loop: true; easing: easeInOutSine');
                    }
                }, 800);
            });

            targetEl.addEventListener('targetFound', () => {
                if (!isStarted) return; 
                if (navigator.vibrate) navigator.vibrate(50);
                
                activeTargetIndex = index;
                activeLayer7Video = l7Vid;
                activeWildcardVideo = wildcardVid;
                activeWildcardPlane = wildcardPlane;

                overlay.classList.remove('visible'); scannerUi.classList.remove('visible');
                ['help-btn', 'cta-btn', 'share-btn', 'info-btn', 'flash-btn'].forEach(id => document.getElementById(id).classList.remove('visible'));
                document.getElementById('screenshot-btn').classList.add('visible'); 
                document.getElementById('record-btn').classList.add('visible');

                for(let l=1; l<=6; l++) targetEl.querySelector(`.l${l}`).setAttribute('visible', true);
                framePlane.setAttribute('visible', true);
                
                if (data.l3Idle === 'hover') {
                    const l3Plane = targetEl.querySelector('.l3');
                    l3Plane.setAttribute('animation__hover', 'property: position; from: 0 0 -1.60; to: 0 0.15 -1.60; dir: alternate; dur: 1200; loop: true; easing: easeInOutSine');
                }

                // Activate New Tweak Physics
                if (data.l4Anim === 'circular') {
                    targetEl.querySelector('.l4').setAttribute('circular-motion', '');
                }
                if (data.l5Anim === 'glitchBob') {
                    targetEl.querySelector('.l5').setAttribute('glitch-bob', '');
                }

                l7Plane.setAttribute('material', {src: l7Vid});
                l7Plane.setAttribute('visible', true);
                l7Vid.play().catch(e => { l7Vid.muted = true; l7Vid.play(); });
            });

            targetEl.addEventListener('targetLost', () => {
                activeTargetIndex = null;
                isWildcardSequenceRunning = false;
                
                document.getElementById('screenshot-btn').classList.remove('visible'); 
                document.getElementById('record-btn').classList.remove('visible');
                
                if (isStarted) {
                    overlay.classList.add('visible'); scannerUi.classList.add('visible');
                    ['help-btn', 'cta-btn', 'share-btn', 'info-btn', 'flash-btn'].forEach(id => document.getElementById(id).classList.add('visible'));
                }
                
                l7Vid.pause();
                wildcardVid.pause();
                wildcardPlane.setAttribute('visible', false);

                // RESET FAILSAFES
                const l3Plane = targetEl.querySelector('.l3');
                l3Plane.removeAttribute('animation__hover');
                l3Plane.removeAttribute('animation');
                l3Plane.setAttribute('position', '0 0 -1.60');
                l3Plane.setAttribute('scale', '1 1 1');

                // Kill Tweak Physics and snap layers back to default
                const l4Plane = targetEl.querySelector('.l4');
                l4Plane.removeAttribute('circular-motion');
                l4Plane.setAttribute('position', '0 0 -1.90');

                const l5Plane = targetEl.querySelector('.l5');
                l5Plane.removeAttribute('glitch-bob');
                l5Plane.setAttribute('position', '0 0 -2.20');

                l7Vid.muted = false;
            });
        };

        window.addEventListener('load', () => Object.keys(COLLECTION_DATA).forEach(index => setupTarget(index)));

        sceneEl.addEventListener("arReady", () => {
            document.getElementById('loading-container').style.visibility = 'hidden'; 
            document.getElementById('logo-container').classList.add('animate-sweep');
            document.getElementById('main-logo').classList.add('animate-logo');
            setTimeout(() => { startBtn.classList.add('visible'); }, 3000);
        });

        startBtn.addEventListener('click', () => {
            if (navigator.vibrate) navigator.vibrate(50);
            if (sfxStart) sfxStart.play();
            if (sfxStartup) setTimeout(() => sfxStartup.play(), 2000);
            
            startScreen.classList.add('hidden');
            overlay.classList.add('visible'); 
            scannerUi.classList.add('visible');
            ['help-btn', 'cta-btn', 'share-btn', 'info-btn', 'flash-btn'].forEach(id => document.getElementById(id).classList.add('visible'));
            isStarted = true;
            
            Object.values(videoPool).forEach(v => v.load());
        });

        let touchPoints = [];
        let isDrawing = false;

        window.addEventListener('pointerdown', (e) => {
            if (!isStarted || activeTargetIndex === null || isWildcardSequenceRunning) return;
            isDrawing = true;
            touchPoints = [{x: e.clientX, y: e.clientY}];
        });

        window.addEventListener('pointermove', (e) => {
            if (!isDrawing) return;
            touchPoints.push({x: e.clientX, y: e.clientY});
        });

        window.addEventListener('pointerup', () => {
            if (!isDrawing) return;
            isDrawing = false;
            
            if (analyzeGesture(touchPoints)) {
                initiateWildcardSequence(activeTargetIndex);
            }
        });

        function analyzeGesture(pts) {
            if (pts.length < 20) return false; 
            let cx = 0, cy = 0;
            pts.forEach(p => { cx += p.x; cy += p.y; });
            cx /= pts.length; cy /= pts.length;

            let totalAngle = 0;
            let prevAngle = Math.atan2(pts[0].y - cy, pts[0].x - cx);

            for (let i = 1; i < pts.length; i++) {
                let angle = Math.atan2(pts[i].y - cy, pts[i].x - cx);
                let delta = angle - prevAngle;
                if (delta > Math.PI) delta -= 2 * Math.PI;
                if (delta < -Math.PI) delta += 2 * Math.PI;
                totalAngle += delta;
                prevAngle = angle;
            }
            return Math.abs(totalAngle) > (3.5 * Math.PI);
        }

        function initiateWildcardSequence(targetIndex) {
            const data = COLLECTION_DATA[targetIndex];
            if (!data) return;

            isWildcardSequenceRunning = true; 

            if (navigator.vibrate) navigator.vibrate([100, 50, 100]); 
            const feedback = document.getElementById('gesture-feedback');
            feedback.style.opacity = '1';
            setTimeout(() => feedback.style.opacity = '0', 3000);

            const l3Plane = document.querySelector(`#target-${targetIndex} .l3`);

            if (data.l3Idle === 'hover') {
                l3Plane.removeAttribute('animation__hover');
            }

            const randomVidNum = Math.floor(Math.random() * data.count) + 1;
            activeWildcardVideo.src = `videos/wildcards/${data.wildcardPrefix}${randomVidNum}.mp4`;
            activeWildcardPlane.setAttribute('position', `0 0 ${data.wildcardZ}`);
            activeWildcardPlane.setAttribute('material', {src: activeWildcardVideo});
            
            activeWildcardVideo.muted = false; 
            const playPromise = activeWildcardVideo.play();
            if (playPromise !== undefined) {
                playPromise.then(() => {
                    activeWildcardVideo.pause(); 
                }).catch(e => console.log("Unlock handled gracefully"));
            }

            if (data.l3AnimType === 'slideLeft') {
                l3Plane.setAttribute('animation', 'property: position; to: -3.5 0 -1.60; dur: 800; easing: easeInOutQuad');
                setTimeout(() => finalizeWildcard(data), 800);
            } else if (data.l3AnimType === 'zoomIn') {
                l3Plane.setAttribute('position', '0 0 -1.60');
                l3Plane.setAttribute('animation', 'property: scale; to: 2 2 2; dur: 800; easing: easeInOutQuad');
                setTimeout(() => finalizeWildcard(data), 800);
            } else {
                l3Plane.setAttribute('position', '0 0 -1.60');
                finalizeWildcard(data);
            }
        }

        function finalizeWildcard(data) {
            if (!isWildcardSequenceRunning) return; 

            if (activeLayer7Video) activeLayer7Video.muted = true;
            
            activeWildcardPlane.setAttribute('visible', true);
            
            activeWildcardVideo.play().catch(e => { 
                activeWildcardVideo.muted = true; 
                activeWildcardVideo.play(); 
            });
        }
    </script>

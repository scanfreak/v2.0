<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SCANFREAK AR V2 - PARALLAX</title>
    
    <link rel="icon" type="image/png" href="assets/scanfreakblanklogo.png">
    <link rel="apple-touch-icon" href="assets/scanfreakblanklogo.png">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

    <script>
        AFRAME.registerComponent('hider-material', {
            init: function () {
                const setHider = (mesh) => {
                    if (!mesh) return;
                    mesh.material.colorWrite = false;
                    mesh.material.depthWrite = true;
                    mesh.material.side = THREE.DoubleSide; // Prevents backface culling
                    mesh.renderOrder = -1; // Forces mask to render before transparent layers
                };
                
                setHider(this.el.getObject3D('mesh'));
                this.el.addEventListener('object3dset', (e) => {
                    if (e.detail.type === 'mesh') {
                        setHider(this.el.getObject3D('mesh'));
                    }
                });
            }
        });
    </script>
    
    <style>
        html, body { width: 100%; height: 100%; margin: 0; overflow: hidden; -webkit-tap-highlight-color: transparent; touch-action: none; }
        a-scene { position: fixed !important; top: 0; left: 0; width: 100vw !important; height: 100vh !important; }

        #start-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.9); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 30; transition: opacity 0.5s, visibility 0.5s; user-select: none; }
        #start-screen.hidden { opacity: 0; visibility: hidden; pointer-events: none; }

        .logo-wrapper { position: relative; overflow: hidden; display: flex; justify-content: center; align-items: center; width: 70vw; height: 70vw; max-width: 300px; max-height: 300px; margin-bottom: 20px; }
        .logo-image { max-width: 90%; max-height: 90%; object-fit: contain; display: block; opacity: 1; }
        .animate-logo { animation: fadeOut 3s ease-in-out forwards; }
        .logo-wrapper::after { content: ""; position: absolute; top: -150%; left: -150%; width: 100%; height: 400%; background: linear-gradient(135deg, transparent, rgba(255,255,255,0.7), transparent); transform: rotate(25deg); }
        .animate-sweep::after { animation: sweep 1.2s ease-in-out forwards; }
        
        @keyframes sweep { 100% { top: 100%; left: 100%; } }
        @keyframes fadeOut { 0%, 70% { opacity: 1; transform: scale(1); } 100% { opacity: 0; transform: scale(0.95); } }

        #loading-container { width: 200px; height: 4px; background: rgba(255, 255, 255, 0.1); margin-top: 20px; border-radius: 10px; position: relative; overflow: hidden; border: 1px solid rgba(255, 255, 255, 0.2); }
        #loading-bar { width: 40%; height: 100%; background: #ffffff; position: absolute; left: -40%; border-radius: 10px; animation: loadingMove 1.5s infinite ease-in-out; box-shadow: 0 0 10px #fff; }
        
        @keyframes loadingMove { 0% { left: -40%; } 50% { left: 100%; } 100% { left: -40%; } }

        #start-btn { font-family: 'Press Start 2P', cursive; padding: 15px 15px; font-size: 15px; color: black; background: white; border: 4px solid #555; border-radius: 15px; cursor: pointer; text-transform: uppercase; box-shadow: 4px 4px 0px #888; opacity: 0; pointer-events: none; transition: opacity 0.8s ease-in; position: absolute; margin-top: 30px; }
        #start-btn.visible { opacity: 1; pointer-events: auto; animation: pulseBtn 1.5s infinite; }
        
        @keyframes pulseBtn { 0% { transform: translateY(-50%) scale(1); } 50% { transform: translateY(-50%) scale(1.08); box-shadow: 0 0 15px rgba(255,255,255,0.4); } 100% { transform: translateY(-50%) scale(1); } }
        #start-btn:active { transform: translateY(-50%) translate(4px, 4px); box-shadow: none; }

        #scanner-ui { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 60vw; height: 60vw; max-width: 320px; max-height: 320px; border: 2px solid rgba(255, 255, 255, 0); z-index: 5; pointer-events: none; opacity: 0; transition: opacity 0.5s; }
        #scanner-ui.visible { opacity: 1; }

        .corner { position: absolute; width: 30px; height: 30px; border: 8px solid white; }
        .top-left { top: -4px; left: -4px; border-right: none; border-bottom: none; }
        .top-right { top: -4px; right: -4px; border-left: none; border-bottom: none; }
        .bottom-left { bottom: -4px; left: -4px; border-right: none; border-top: none; }
        .bottom-right { bottom: -4px; right: -4px; border-left: none; border-top: none; }

        .scan-line { position: absolute; width: 100%; height: 8px; background: white; top: 0; left: 0; box-shadow: 0 0 20px white; animation: scanMove 2.0s ease-in-out infinite; }
        @keyframes scanMove { 0%, 100% { top: 5%; opacity: 0.3; } 50% { top: 95%; opacity: 1; } }

        #overlay { position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); width: 80%; max-width: 400px; padding: 12px 0; color: white; font-size: 18px; font-family: Arial, sans-serif; text-shadow: 2px 2px 4px black; background: rgba(0, 0, 0, 0.6); border-radius: 12px; z-index: 10; transition: opacity 0.5s; pointer-events: none; opacity: 0; overflow: hidden; white-space: nowrap; }
        #overlay.visible { opacity: 1; }

        .marquee-text { display: inline-block; padding-left: 100%; animation: scroll-left 6.4s linear infinite; }
        @keyframes scroll-left { 0% { transform: translateX(0); } 100% { transform: translateX(-100%); } }

        .btn-ui { position: absolute; width: 36px; height: 36px; right: 15px; background: rgba(0, 0, 0, 0.4); color: white; border: 2px solid white; border-radius: 10px; display: flex; justify-content: center; align-items: center; cursor: pointer; z-index: 50; transition: opacity 0.5s; opacity: 0; pointer-events: none; text-decoration: none; overflow: hidden; }
        .btn-ui.visible { opacity: 1; pointer-events: auto !important; }
        
        #info-btn { top: 15px; } #flash-btn { top: 60px; } #share-btn { top: 105px; } #cta-btn { top: 150px; } #help-btn { top: 195px; }

        #screenshot-btn { position: absolute; bottom: 30px; left: 50%; transform: translateX(-110%); width: 60px; height: 60px; border-radius: 15px; z-index: 20; display: none; }
        #screenshot-btn.visible { display: flex; opacity: 1; pointer-events: auto; }

        #record-btn { position: absolute; bottom: 30px; left: 15px; width: 60px; height: 60px; border-radius: 15px; z-index: 20; display: none; }
        #record-btn.visible { display: flex; opacity: 1; pointer-events: auto; }
        #record-btn.recording { border-color: #ff0000; animation: pulseRec 1s infinite; }
        @keyframes pulseRec { 0% { box-shadow: 0 0 0px red; } 50% { box-shadow: 0 0 15px red; } 100% { box-shadow: 0 0 0px red; } }

        #rec-timer { position: absolute; bottom: 45px; right: 15px; font-family: 'Press Start 2P', cursive; font-size: 10px; color: #ff0000; background: rgba(0, 0, 0, 0.5); padding: 8px; border-radius: 5px; z-index: 20; pointer-events: none; display: none; }
        #zoom-display { position: absolute; bottom: 15px; right: 15px; font-family: 'Press Start 2P', cursive; font-size: 10px; color: white; background: rgba(0, 0, 0, 0.5); padding: 8px; border-radius: 5px; z-index: 20; pointer-events: none; opacity: 0; transition: opacity 0.3s; }
        #zoom-display.visible { opacity: 1; }

        .ui-icon { width: 70%; height: 70%; object-fit: contain; }

        .msg-box { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 85%; max-width: 400px; padding: 25px; text-align: center; color: white; background: rgba(0, 0, 0, 0.9); border-radius: 15px; border: 2px solid white; z-index: 40; transition: opacity 0.5s; opacity: 0; pointer-events: none; user-select: none; -webkit-user-select: none; line-height: 1.6; }
        .msg-box.visible { opacity: 1; pointer-events: auto; }
        
        #info-message, #help-message { width: 54vw; height: 54vw; max-width: 250px; max-height: 250px; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 15px; line-height: 1.35; font-family: Arial, sans-serif; font-size: 15px; }
        .normal-font { font-family: Arial, sans-serif; font-size: 17px; }

        /* Easter Egg Styles */
        #easter-egg-img { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 100vw; height: 100vh; object-fit: contain; z-index: 9999; pointer-events: none; display: none; opacity: 1; }
        .glitch-active { animation: glitchShake 0.12s infinite; }
        @keyframes glitchShake { 0% { transform: translate(-50%, -50%) translate(5px, 5px) scale(1.02); filter: hue-rotate(0deg); } 20% { transform: translate(-50%, -50%) translate(-5px, -5px) scale(0.98); filter: hue-rotate(90deg) invert(0.2); } 40% { transform: translate(-50%, -50%) translate(-8px, 8px) scale(1.05); filter: hue-rotate(-90deg); } 60% { transform: translate(-50%, -50%) translate(8px, -5px) scale(0.95); filter: invert(0.5); } 80% { transform: translate(-50%, -50%) translate(-3px, -8px) scale(1.02); filter: hue-rotate(180deg); } 100% { transform: translate(-50%, -50%) translate(5px, 5px) scale(1); filter: hue-rotate(0deg); } }
    </style>
</head>
<body>

    <img id="easter-egg-img" src="assets/dev.png" alt="dev">

    <div id="scanner-ui">
        <div class="corner top-left"></div>
        <div class="corner top-right"></div>
        <div class="corner bottom-left"></div>
        <div class="corner bottom-right"></div>
        <div class="scan-line"></div>
    </div>

    <div id="start-screen">
        <div class="logo-wrapper" id="logo-container">
            <img src="assets/scanfreakblanklogo.png" class="logo-image" id="main-logo" alt="SCANFREAK AR">
        </div>
        <div id="loading-container"><div id="loading-bar"></div></div>
        <button id="start-btn">PRESS START</button>
    </div>

    <div id="info-btn" class="btn-ui"><img src="assets/infoicon.png" class="ui-icon"></div>
    <div id="flash-btn" class="btn-ui"><img src="assets/flashicon.png" class="ui-icon"></div>
    <div id="share-btn" class="btn-ui"><img src="assets/shareicon.png" class="ui-icon"></div>
    <div id="cta-btn" class="btn-ui"><img src="assets/storeicon.png" class="ui-icon"></div>
    <div id="help-btn" class="btn-ui"><img src="assets/helpicon.png" class="ui-icon"></div>
    <div id="screenshot-btn" class="btn-ui"><img src="assets/screenshoticon.png" class="ui-icon"></div>
    <div id="record-btn" class="btn-ui"><img src="assets/recordicon.png" class="ui-icon"></div>

    <div id="rec-timer">REC: 00:00</div>
    <div id="zoom-display">ZOOM: 1.0x</div>

    <div id="help-message" class="msg-box normal-font">Scanner not loading? Pause your VPN, Adblocker or use link above in a default browser.</div>
    <div id="info-message" class="msg-box normal-font">Welcome Freaks<br>POINT SCAN DISCOVER!</div>
    
    <div id="overlay">
        <span class="marquee-text">Point camera at the SCANFREAK design!</span>
    </div>

    <a-scene id="ar-scene"
        mindar-image="imageTargetSrc: descriptors/test/cyberpunk.mind; filterMinCF: 0.0001; filterBeta: 0.001; missTolerance: 5; uiScanning: no" 
        color-space="sRGB" 
        renderer="colorManagement: true, physicallyCorrectLights: true, preserveDrawingBuffer: true, antialias: false, alpha: true" 
        vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false" embedded>

        <a-assets>
            <audio id="sfx-start" src="assets/sfx/start.mp3" preload="auto"></audio>
            <audio id="sfx-startup" src="assets/sfx/startup.mp3" preload="auto"></audio>
            
            <img id="l1" src="parallax/layer1_frame.png">
            <img id="l2" src="parallax/layer2_car.png">
            <img id="l3" src="parallax/layer3_signs.png">
            <img id="l4" src="parallax/layer4_buildings.png">
            
            <video id="l5-vid" src="videos/layer5_rain.mp4" loop crossorigin="anonymous" playsinline></video>
        </a-assets>

        <a-entity mindar-image-target="targetIndex: 0" id="target-0">
            
            <a-entity id="occlusion-mask" position="0 0 0.01">
                <a-plane position="0 25.888 0" width="100" height="50" hider-material></a-plane>
                <a-plane position="0 -25.888 0" width="100" height="50" hider-material></a-plane>
                <a-plane position="-25.5 0 0" width="50" height="1.777" hider-material></a-plane>
                <a-plane position="25.5 0 0" width="50" height="1.777" hider-material></a-plane>
            </a-entity>

            <a-plane src="#l1" width="1" height="1.777" position="0 0 0.02" transparent="true" material="shader: flat; alphaTest: 0.5"></a-plane>
            
            <a-plane src="#l2" width="1.5" height="2.66" position="0 0 -0.50" transparent="true" material="shader: flat; alphaTest: 0.5"></a-plane>
            
            <a-plane src="#l3" width="1.9" height="3.37" position="0 0 -0.90" transparent="true" material="shader: flat; alphaTest: 0.5"></a-plane>
            
            <a-plane src="#l4" width="2.2" height="3.91" position="0 0 -1.20" transparent="true" material="shader: flat; alphaTest: 0.5"></a-plane>
            
            <a-video src="#l5-vid" width="2.4" height="4.26" position="0 0 -1.40"></a-video>

        </a-entity>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
    </a-scene>

    <script>
        const sceneEl = document.querySelector('a-scene');
        const startScreen = document.getElementById('start-screen');
        const startBtn = document.getElementById('start-btn');
        const scannerUi = document.getElementById('scanner-ui');
        const overlay = document.getElementById('overlay');
        const sfxStart = document.getElementById('sfx-start');
        const sfxStartup = document.getElementById('sfx-startup');
        
        const helpBtn = document.getElementById('help-btn');
        const ctaBtn = document.getElementById('cta-btn');
        const shareBtn = document.getElementById('share-btn');
        const infoBtn = document.getElementById('info-btn');
        const flashBtn = document.getElementById('flash-btn');

        let isStarted = false;

        const target = document.querySelector('#target-0');
        const video = document.querySelector('#l5-vid');

        // Boot Sequence
        sceneEl.addEventListener("arReady", () => {
            document.getElementById('loading-container').style.visibility = 'hidden'; 
            document.getElementById('logo-container').classList.add('animate-sweep');
            document.getElementById('main-logo').classList.add('animate-logo');
            setTimeout(() => { startBtn.classList.add('visible'); }, 3000);
        });

        // Start Button Logic
        startBtn.addEventListener('click', () => {
            if (navigator.vibrate) navigator.vibrate(50);
            if (sfxStart) sfxStart.play();
            if (sfxStartup) setTimeout(() => sfxStartup.play(), 2000);
            
            startScreen.classList.add('hidden');
            overlay.classList.add('visible'); 
            scannerUi.classList.add('visible');
            [helpBtn, ctaBtn, shareBtn, infoBtn, flashBtn].forEach(btn => btn.classList.add('visible'));
            isStarted = true;
            
            // Pre-warm the video
            video.load();
        });

        // Target Found Logic
        target.addEventListener('targetFound', () => {
            if (!isStarted) return;
            if (navigator.vibrate) navigator.vibrate(50);
            
            overlay.classList.remove('visible'); 
            scannerUi.classList.remove('visible');
            [helpBtn, ctaBtn, shareBtn, infoBtn, flashBtn].forEach(btn => btn.classList.remove('visible'));
            
            document.getElementById('screenshot-btn').classList.add('visible');
            document.getElementById('record-btn').classList.add('visible');
            
            video.play().catch(e => {
                video.muted = true;
                video.play();
            });
        });

        // Target Lost Logic
        target.addEventListener('targetLost', () => {
            document.getElementById('screenshot-btn').classList.remove('visible');
            document.getElementById('record-btn').classList.remove('visible');
            
            if (isStarted) {
                overlay.classList.add('visible'); 
                scannerUi.classList.add('visible');
                [helpBtn, ctaBtn, shareBtn, infoBtn, flashBtn].forEach(btn => btn.classList.add('visible'));
            }
            video.pause();
        });
    </script>
</body>
</html>

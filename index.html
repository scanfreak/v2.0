<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SCANFREAK AR V2.16 - 2-TARGET SYNC</title>
    
    <link rel="icon" type="image/png" href="assets/scanfreakblanklogo.png">
    <link rel="apple-touch-icon" href="assets/scanfreakblanklogo.png">
    <meta property="og:image" content="assets/scanfreakblanklogo.png">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

    <script>
        AFRAME.registerComponent('hider-material', {
            init: function () {
                const setHider = (mesh) => {
                    if (!mesh) return;
                    mesh.material.colorWrite = false;
                    mesh.material.depthWrite = true;
                    mesh.material.side = THREE.DoubleSide; 
                    mesh.renderOrder = -1; 
                };
                setHider(this.el.getObject3D('mesh'));
                this.el.addEventListener('object3dset', (e) => {
                    if (e.detail.type === 'mesh') { setHider(this.el.getObject3D('mesh')); }
                });
            }
        });

        AFRAME.registerComponent('circular-motion', {
            schema: { radius: {type: 'number', default: 0.04}, speed: {type: 'number', default: 0.0015} },
            init: function() { 
                this.time = 0; 
                this.baseX = this.el.object3D.position.x; 
                this.baseY = this.el.object3D.position.y; 
            },
            tick: function(t, dt) {
                this.time += dt * this.data.speed;
                this.el.object3D.position.x = this.baseX + Math.cos(this.time) * this.data.radius;
                this.el.object3D.position.y = this.baseY + Math.sin(this.time) * this.data.radius;
            }
        });

        AFRAME.registerComponent('smooth-bob', {
            schema: { bobSpeed: {type: 'number', default: 0.002}, bobHeight: {type: 'number', default: 0.06} },
            init: function() {
                this.time = 0;
                this.baseX = this.el.object3D.position.x;
                this.baseY = this.el.object3D.position.y;
            },
            tick: function(t, dt) {
                this.time += dt * this.data.bobSpeed;
                let newY = this.baseY + Math.sin(this.time) * this.data.bobHeight;
                this.el.object3D.position.set(this.baseX, newY, this.el.object3D.position.z);
            }
        });

        AFRAME.registerComponent('evil-glitch', {
            schema: { active: {type: 'boolean', default: false} },
            tick: function() {
                if(!this.data.active) {
                    this.el.setAttribute('opacity', 1);
                    return;
                }
                if(Math.random() < 0.04) {
                    this.el.setAttribute('opacity', Math.random() > 0.5 ? 0.2 : 0.7);
                } else {
                    this.el.setAttribute('opacity', 1);
                }
            }
        });

        AFRAME.registerComponent('proximity-door', {
            schema: { active: {type: 'boolean', default: false} },
            init: function() {
                this.isOpen = false;
                this.camera = document.querySelector('a-camera').object3D;
                this.doorAudio = document.getElementById('sfx-door-whoosh');
                this.vector = new THREE.Vector3();
                this.camDir = new THREE.Vector3();
            },
            tick: function() {
                if(!this.data.active) {
                    if (this.isOpen) {
                        this.el.setAttribute('position', '0 0 0.02'); 
                        this.isOpen = false;
                    }
                    return;
                }

                this.el.parentEl.object3D.getWorldPosition(this.vector);
                let dist = this.camera.position.distanceTo(this.vector);
                
                this.camera.getWorldDirection(this.camDir);
                let normal = new THREE.Vector3(0, 0, 1);
                normal.transformDirection(this.el.parentEl.object3D.matrixWorld).normalize();
                let angleDot = Math.abs(normal.dot(this.camDir)); 
                let isExtremeAngle = angleDot < 0.45; 

                let shouldBeOpen = dist < 2.5 || isExtremeAngle; 
                let shouldBeClosed = dist > 3.2 && !isExtremeAngle; 

                if (shouldBeOpen && !this.isOpen) {
                    this.isOpen = true;
                    this.el.setAttribute('animation__door', 'property: position; to: -1.05 0 0.02; dur: 800; easing: easeOutQuad');
                    if(this.doorAudio) { this.doorAudio.currentTime = 0; this.doorAudio.play(); }
                } else if (shouldBeClosed && this.isOpen) {
                    this.isOpen = false;
                    this.el.setAttribute('animation__door', 'property: position; to: 0 0 0.02; dur: 800; easing: easeOutQuad');
                    if(this.doorAudio) { this.doorAudio.currentTime = 0; this.doorAudio.play(); }
                }
            }
        });
    </script>
    
    <style>
        html, body { width: 100%; height: 100%; margin: 0; overflow: hidden; -webkit-tap-highlight-color: transparent; touch-action: none; }
        a-scene { position: fixed !important; top: 0; left: 0; width: 100vw !important; height: 100vh !important; }

        #start-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.9); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 30; transition: opacity 0.5s, visibility 0.5s; user-select: none; }
        #start-screen.hidden { opacity: 0; visibility: hidden; pointer-events: none; }

        .logo-wrapper { position: relative; overflow: hidden; display: flex; justify-content: center; align-items: center; width: 70vw; height: 70vw; max-width: 300px; max-height: 300px; margin-bottom: 20px; }
        .logo-image { max-width: 90%; max-height: 90%; object-fit: contain; display: block; opacity: 1; }
        .animate-logo { animation: fadeOut 3s ease-in-out forwards; }
        .logo-wrapper::after { content: ""; position: absolute; top: -150%; left: -150%; width: 100%; height: 400%; background: linear-gradient(135deg, transparent, rgba(255,255,255,0.7), transparent); transform: rotate(25deg); }
        .animate-sweep::after { animation: sweep 1.2s ease-in-out forwards; }
        @keyframes sweep { 100% { top: 100%; left: 100%; } }
        @keyframes fadeOut { 0%, 70% { opacity: 1; transform: scale(1); } 100% { opacity: 0; transform: scale(0.95); } }

        #loading-container { width: 200px; height: 4px; background: rgba(255, 255, 255, 0.1); margin-top: 20px; border-radius: 10px; position: relative; overflow: hidden; border: 1px solid rgba(255, 255, 255, 0.2); }
        #loading-bar { width: 40%; height: 100%; background: #ffffff; position: absolute; left: -40%; border-radius: 10px; animation: loadingMove 1.5s infinite ease-in-out; box-shadow: 0 0 10px #fff; }
        @keyframes loadingMove { 0% { left: -40%; } 50% { left: 100%; } 100% { left: -40%; } }

        #start-btn { font-family: 'Press Start 2P', cursive; padding: 15px 15px; font-size: 15px; color: black; background: white; border: 4px solid #555; border-radius: 15px; cursor: pointer; text-transform: uppercase; box-shadow: 4px 4px 0px #888; opacity: 0; pointer-events: none; transition: opacity 0.8s ease-in; position: absolute; margin-top: 30px; }
        #start-btn.visible { opacity: 1; pointer-events: auto; animation: pulseBtn 1.5s infinite; }
        @keyframes pulseBtn { 0% { transform: translateY(-50%) scale(1); } 50% { transform: translateY(-50%) scale(1.08); box-shadow: 0 0 15px rgba(255,255,255,0.4); } 100% { transform: translateY(-50%) scale(1); } }
        #start-btn:active { transform: translateY(-50%) translate(4px, 4px); box-shadow: none; }

        #scanner-ui { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 60vw; height: 60vw; max-width: 320px; max-height: 320px; border: 2px solid rgba(255, 255, 255, 0); z-index: 5; pointer-events: none; opacity: 0; transition: opacity 0.5s; }
        #scanner-ui.visible { opacity: 1; }
        .corner { position: absolute; width: 30px; height: 30px; border: 8px solid white; }
        .top-left { top: -4px; left: -4px; border-right: none; border-bottom: none; }
        .top-right { top: -4px; right: -4px; border-left: none; border-bottom: none; }
        .bottom-left { bottom: -4px; left: -4px; border-right: none; border-top: none; }
        .bottom-right { bottom: -4px; right: -4px; border-left: none; border-top: none; }
        .scan-line { position: absolute; width: 100%; height: 8px; background: white; top: 0; left: 0; box-shadow: 0 0 20px white; animation: scanMove 2.0s ease-in-out infinite; }
        @keyframes scanMove { 0%, 100% { top: 5%; opacity: 0.3; } 50% { top: 95%; opacity: 1; } }

        #overlay { position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); width: 80%; max-width: 400px; padding: 12px 0; color: white; font-size: 18px; font-family: Arial, sans-serif; text-shadow: 2px 2px 4px black; background: rgba(0, 0, 0, 0.6); border-radius: 12px; z-index: 10; transition: opacity 0.5s; pointer-events: none; opacity: 0; overflow: hidden; white-space: nowrap; }
        #overlay.visible { opacity: 1; }
        .marquee-text { display: inline-block; padding-left: 100%; animation: scroll-left 6.4s linear infinite; }
        @keyframes scroll-left { 0% { transform: translateX(0); } 100% { transform: translateX(-100%); } }

        .btn-ui { position: absolute; width: 36px; height: 36px; right: 15px; background: rgba(0, 0, 0, 0.4); color: white; border: 2px solid white; border-radius: 10px; display: flex; justify-content: center; align-items: center; cursor: pointer; z-index: 50; transition: opacity 0.5s; opacity: 0; pointer-events: none; overflow: hidden; }
        .btn-ui.visible { opacity: 1; pointer-events: auto !important; }
        #info-btn { top: 15px; } #flash-btn { top: 60px; } #share-btn { top: 105px; } #cta-btn { top: 150px; } #help-btn { top: 195px; }
        #screenshot-btn { position: absolute; bottom: 30px; left: 50%; transform: translateX(-110%); width: 60px; height: 60px; border-radius: 15px; z-index: 20; display: none; }
        #screenshot-btn.visible { display: flex; opacity: 1; pointer-events: auto; }
        #record-btn { position: absolute; bottom: 30px; left: 15px; width: 60px; height: 60px; border-radius: 15px; z-index: 20; display: none; }
        #record-btn.visible { display: flex; opacity: 1; pointer-events: auto; }
        .ui-icon { width: 70%; height: 70%; object-fit: contain; }

        #gesture-feedback { position: absolute; top: 15px; left: 15px; color: #00ff00; font-family: 'Press Start 2P', cursive; font-size: 10px; z-index: 99; opacity: 0; transition: opacity 0.3s; text-shadow: 1px 1px 2px black; pointer-events: none; }
        #easter-egg-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: black; color: red; display: flex; justify-content: center; align-items: center; z-index: 100; font-family: 'Press Start 2P', cursive; font-size: 20px; opacity: 0; visibility: hidden; pointer-events: none; transition: opacity 0.5s; }
        #easter-egg-overlay.active { opacity: 1; visibility: visible; }
    </style>
</head>
<body>

    <div id="gesture-feedback">WILDCARD UNLOCKED</div>
    <div id="easter-egg-overlay">SYSTEM OVERRIDE</div>

    <div id="scanner-ui">
        <div class="corner top-left"></div>
        <div class="corner top-right"></div>
        <div class="corner bottom-left"></div>
        <div class="corner bottom-right"></div>
        <div class="scan-line"></div>
    </div>

    <div id="start-screen">
        <div class="logo-wrapper" id="logo-container">
            <img src="assets/scanfreakblanklogo.png" class="logo-image" id="main-logo" alt="SCANFREAK AR">
        </div>
        <div id="loading-container"><div id="loading-bar"></div></div>
        <button id="start-btn">PRESS START</button>
    </div>

    <div id="info-btn" class="btn-ui"><img src="assets/infoicon.png" class="ui-icon"></div>
    <div id="flash-btn" class="btn-ui"><img src="assets/flashicon.png" class="ui-icon"></div>
    <div id="share-btn" class="btn-ui"><img src="assets/shareicon.png" class="ui-icon"></div>
    <div id="cta-btn" class="btn-ui"><img src="assets/storeicon.png" class="ui-icon"></div>
    <div id="help-btn" class="btn-ui"><img src="assets/helpicon.png" class="ui-icon"></div>
    <div id="screenshot-btn" class="btn-ui"><img src="assets/screenshoticon.png" class="ui-icon"></div>
    <div id="record-btn" class="btn-ui"><img src="assets/recordicon.png" class="ui-icon"></div>

    <div id="overlay">
        <span class="marquee-text">Point camera at the SCANFREAK design!</span>
    </div>

    <a-scene id="ar-scene"
        mindar-image="imageTargetSrc: descriptors/collection02/collection02.mind; filterMinCF: 0.0001; filterBeta: 0.001; missTolerance: 5; uiScanning: no" 
        color-space="sRGB" 
        renderer="colorManagement: true, physicallyCorrectLights: true, preserveDrawingBuffer: true, antialias: false, alpha: true" 
        vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false" embedded>

        <a-assets timeout="3000">
            <audio id="sfx-start" src="assets/sfx/start.mp3" preload="auto"></audio>
            <audio id="sfx-startup" src="assets/sfx/startup.mp3" preload="auto"></audio>
            <audio id="sfx-siren" src="assets/sfx/siren.mp3" preload="auto"></audio>
            <audio id="sfx-door-whoosh" src="assets/sfx/door-whoosh.mp3" preload="auto"></audio>
            <audio id="sfx-evil-laugh" src="assets/sfx/evil-laugh.mp3" preload="auto" loop></audio>

            <video id="shared-l7-vid" src="" crossOrigin="anonymous" loop playsinline></video>
            <video id="shared-wildcard-vid" src="" crossOrigin="anonymous" playsinline></video>
        </a-assets>

        <script>
            // CRITICAL FIX: Loop set to 1 (2 items total: index 0 and 1) to perfectly match the current collection02.mind file constraints.
            for(let i=0; i<=1; i++) {
                document.write(`
                <a-entity mindar-image-target="targetIndex: ${i}" id="target-${i}">
                    <a-entity id="occlusion-mask-${i}" position="0 0 0.01">
                        <a-plane position="0 25.888 0" width="50" height="50" hider-material></a-plane>
                        <a-plane position="0 -25.888 0" width="50" height="50" hider-material></a-plane>
                        <a-plane position="-25.5 0 0" width="50" height="1.777" hider-material></a-plane>
                        <a-plane position="25.5 0 0" width="50" height="1.777" hider-material></a-plane>
                    </a-entity>
                    
                    <a-plane class="l1" width="1.05" height="1.866" position="0 0 0.02" transparent="true" material="shader: flat; alphaTest: 0.5" visible="false"></a-plane>
                    <a-plane class="l2" width="1.8" height="3.20" position="0 0 -1.30" transparent="true" material="shader: flat; color: #ffffff; alphaTest: 0.5" visible="false"></a-plane>
                    <a-plane class="l3" width="2.0" height="3.55" position="0 0 -1.60" transparent="true" material="shader: flat; color: #ffffff; alphaTest: 0.5" visible="false"></a-plane>
                    <a-plane class="l4" width="2.2" height="3.91" position="0 0 -1.90" transparent="true" material="shader: flat; alphaTest: 0.5" visible="false"></a-plane>
                    <a-plane class="l5" width="2.4" height="4.26" position="0 0 -2.20" transparent="true" material="shader: flat; alphaTest: 0.5" visible="false"></a-plane>
                    <a-plane class="l6" width="2.6" height="4.62" position="0 0 -2.50" transparent="true" material="shader: flat; alphaTest: 0.5" visible="false"></a-plane>
                    
                    <a-plane class="l7-frame" width="11.2" height="19.88" position="0 0 -2.82" transparent="true" material="shader: flat; alphaTest: 0.5" visible="false"></a-plane>
                    
                    <a-plane class="l7" width="2.8" height="4.97" position="0 0 -2.80" transparent="true" material="shader: flat; side: double" visible="false"></a-plane>
                    
                    <a-plane class="wildcard-layer" position="0 0 0" transparent="true" material="shader: flat; side: double" visible="false"></a-plane>
                </a-entity>`);
            }
        </script>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
    </a-scene>

    <script>
        const BASE_DATA = [
            { name: 'cyberpunk dystopia', id: '01', folder: 'cyberpunk dystopia layers', wildcardPrefix: 'cyber', count: 10, designLogic: 'cyberpunk', wildcardZ: -2.75, wildcardW: 2.75, wildcardH: 4.88 },
            { name: 'containment cell', id: '02', folder: 'containment cell layers', wildcardPrefix: 'conta', count: 10, designLogic: 'containment', wildcardZ: -2.15, wildcardW: 2.4, wildcardH: 4.26 },
            { name: 'liminal space', id: '03', folder: 'liminal space layers', wildcardPrefix: 'limin', count: 10, designLogic: 'none', wildcardZ: -2.75, wildcardW: 2.75, wildcardH: 4.88 },
            { name: 'mystical abyss', id: '04', folder: 'mystical abyss layers', wildcardPrefix: 'abyss', count: 10, designLogic: 'none', wildcardZ: -2.75, wildcardW: 2.75, wildcardH: 4.88 },
            { name: 'cosmic tear', id: '05', folder: 'cosmic tear layers', wildcardPrefix: 'cosmi', count: 10, designLogic: 'none', wildcardZ: -2.75, wildcardW: 2.75, wildcardH: 4.88 },
            { name: 'steampunk core', id: '06', folder: 'steampunk core layers', wildcardPrefix: 'steam', count: 10, designLogic: 'none', wildcardZ: -2.75, wildcardW: 2.75, wildcardH: 4.88 },
            { name: 'cyrptic ruin', id: '07', folder: 'cyrptic ruin layers', wildcardPrefix: 'crypt', count: 10, designLogic: 'none', wildcardZ: -2.75, wildcardW: 2.75, wildcardH: 4.88 },
            { name: 'server room', id: '08', folder: 'server room layers', wildcardPrefix: 'serve', count: 10, designLogic: 'none', wildcardZ: -2.75, wildcardW: 2.75, wildcardH: 4.88 },
            { name: 'apocalyptic dread', id: '09', folder: 'apocalyptic dread layers', wildcardPrefix: 'apoca', count: 10, designLogic: 'none', wildcardZ: -2.75, wildcardW: 2.75, wildcardH: 4.88 },
            { name: 'impossible geomtry', id: '10', folder: 'impossible geomtry layers', wildcardPrefix: 'impos', count: 10, designLogic: 'none', wildcardZ: -2.75, wildcardW: 2.75, wildcardH: 4.88 },
            { name: 'bizarre vista', id: '11', folder: 'bizarre vista layers', wildcardPrefix: 'bizar', count: 10, designLogic: 'none', wildcardZ: -2.75, wildcardW: 2.75, wildcardH: 4.88 },
            { name: 'system glitch', id: '12', folder: 'system glitch layers', wildcardPrefix: 'syste', count: 10, designLogic: 'none', wildcardZ: -2.75, wildcardW: 2.75, wildcardH: 4.88 }
        ];

        const COLLECTION_DATA = {};
        BASE_DATA.forEach((data, index) => { 
            COLLECTION_DATA[index] = data; 
        });

        const sceneEl = document.querySelector('a-scene');
        const startScreen = document.getElementById('start-screen');
        const startBtn = document.getElementById('start-btn');
        const scannerUi = document.getElementById('scanner-ui');
        const overlay = document.getElementById('overlay');
        const sfxStart = document.getElementById('sfx-start');
        const sfxStartup = document.getElementById('sfx-startup');
        
        let isStarted = false;
        let activeTargetIndex = null;
        let isWildcardSequenceRunning = false;
        
        const sfxSiren = document.getElementById('sfx-siren');
        const sfxEvilLaugh = document.getElementById('sfx-evil-laugh');

        const sharedL7Vid = document.getElementById('shared-l7-vid');
        const sharedWildcardVid = document.getElementById('shared-wildcard-vid');

        sharedWildcardVid.addEventListener('ended', () => {
            if (activeTargetIndex === null) return;
            const data = COLLECTION_DATA[activeTargetIndex];
            const targetEl = document.querySelector(`#target-${activeTargetIndex}`);
            
            targetEl.querySelector('.wildcard-layer').setAttribute('visible', false);
            isWildcardSequenceRunning = false;
            sharedL7Vid.muted = false;

            if (data.designLogic === 'cyberpunk') {
                const l3Plane = targetEl.querySelector('.l3');
                l3Plane.setAttribute('animation', 'property: position; from: 3.5 0 -1.60; to: 0 0 -1.60; dur: 800; easing: easeInOutQuad');
                setTimeout(() => {
                    if (activeTargetIndex !== null) {
                        l3Plane.setAttribute('animation__hover', 'property: position; from: 0 0 -1.60; to: 0 0.15 -1.60; dir: alternate; dur: 1200; loop: true; easing: easeInOutSine');
                    }
                }, 800);
            }

            if (data.designLogic === 'containment') {
                const l2Plane = targetEl.querySelector('.l2');
                const l3Plane = targetEl.querySelector('.l3');
                const l4Plane = targetEl.querySelector('.l4');
                const l6Plane = targetEl.querySelector('.l6');

                l4Plane.setAttribute('animation__scale', 'property: scale; to: 1 1 1; dur: 800; easing: easeInOutQuad');

                setTimeout(() => {
                    if (activeTargetIndex === null) return;
                    l2Plane.removeAttribute('animation__color');
                    l2Plane.removeAttribute('animation__op');
                    l2Plane.setAttribute('material', {color: '#ffffff', opacity: 1});

                    l3Plane.removeAttribute('animation__color');
                    l3Plane.removeAttribute('animation__op');
                    l3Plane.setAttribute('material', {color: '#ffffff', opacity: 1});

                    l6Plane.setAttribute('evil-glitch', 'active: true');
                    if (sfxEvilLaugh) sfxEvilLaugh.muted = false;
                }, 800);
            }
        });

        const setupTarget = (index) => {
            const data = COLLECTION_DATA[index];
            const targetEl = document.querySelector(`#target-${index}`);
            if (!targetEl) return;

            for(let l=1; l<=6; l++) {
                const plane = targetEl.querySelector(`.l${l}`);
                plane.setAttribute('src', `parallax/${data.folder}/layer${l}_${data.id}.png`);
            }
            targetEl.querySelector('.l7-frame').setAttribute('src', `parallax/${data.folder}/layer7_frame_${data.id}.png`);

            targetEl.addEventListener('targetFound', () => {
                if (!isStarted) return; 
                if (navigator.vibrate) navigator.vibrate(50);
                
                activeTargetIndex = index;

                overlay.classList.remove('visible'); scannerUi.classList.remove('visible');
                ['help-btn', 'cta-btn', 'share-btn', 'info-btn', 'flash-btn'].forEach(id => document.getElementById(id).classList.remove('visible'));
                document.getElementById('screenshot-btn').classList.add('visible'); 
                document.getElementById('record-btn').classList.add('visible');

                for(let l=1; l<=6; l++) targetEl.querySelector(`.l${l}`).setAttribute('visible', true);
                targetEl.querySelector('.l7-frame').setAttribute('visible', true);
                
                if (data.designLogic === 'cyberpunk') {
                    targetEl.querySelector('.l3').setAttribute('animation__hover', 'property: position; from: 0 0 -1.60; to: 0 0.15 -1.60; dir: alternate; dur: 1200; loop: true; easing: easeInOutSine');
                    targetEl.querySelector('.l4').setAttribute('circular-motion', '');
                    targetEl.querySelector('.l5').setAttribute('smooth-bob', '');
                }

                if (data.designLogic === 'containment') {
                    targetEl.querySelector('.l1').setAttribute('proximity-door', 'active: true');
                    targetEl.querySelector('.l6').setAttribute('evil-glitch', 'active: true');
                    if (sfxEvilLaugh) { sfxEvilLaugh.muted = false; sfxEvilLaugh.play(); }
                    if (sfxSiren) { sfxSiren.currentTime = 0; sfxSiren.play(); }
                }

                sharedL7Vid.src = `parallax/${data.folder}/layer7_${data.id}.mp4`;
                sharedL7Vid.load();
                const l7Plane = targetEl.querySelector('.l7');
                l7Plane.setAttribute('src', '#shared-l7-vid');
                l7Plane.setAttribute('visible', true);
                sharedL7Vid.play().catch(e => { sharedL7Vid.muted = true; sharedL7Vid.play(); });
            });

            targetEl.addEventListener('targetLost', () => {
                activeTargetIndex = null;
                isWildcardSequenceRunning = false;
                
                document.getElementById('screenshot-btn').classList.remove('visible'); 
                document.getElementById('record-btn').classList.remove('visible');
                
                if (isStarted) {
                    overlay.classList.add('visible'); scannerUi.classList.add('visible');
                    ['help-btn', 'cta-btn', 'share-btn', 'info-btn', 'flash-btn'].forEach(id => document.getElementById(id).classList.add('visible'));
                }
                
                sharedL7Vid.pause();
                sharedWildcardVid.pause();
                targetEl.querySelector('.wildcard-layer').setAttribute('visible', false);

                const l1Plane = targetEl.querySelector('.l1');
                l1Plane.removeAttribute('proximity-door');
                l1Plane.removeAttribute('animation__door');
                l1Plane.setAttribute('position', '0 0 0.02');

                const l2Plane = targetEl.querySelector('.l2');
                l2Plane.removeAttribute('animation__color');
                l2Plane.removeAttribute('animation__op');
                l2Plane.setAttribute('material', {color: '#ffffff', opacity: 1});

                const l3Plane = targetEl.querySelector('.l3');
                l3Plane.removeAttribute('animation__hover');
                l3Plane.removeAttribute('animation');
                l3Plane.removeAttribute('animation__color');
                l3Plane.removeAttribute('animation__op');
                l3Plane.setAttribute('position', '0 0 -1.60');
                l3Plane.setAttribute('scale', '1 1 1');
                l3Plane.setAttribute('material', {color: '#ffffff', opacity: 1});

                const l4Plane = targetEl.querySelector('.l4');
                l4Plane.removeAttribute('circular-motion');
                l4Plane.removeAttribute('animation__scale');
                l4Plane.setAttribute('position', '0 0 -1.90');
                l4Plane.setAttribute('scale', '1 1 1');

                const l5Plane = targetEl.querySelector('.l5');
                l5Plane.removeAttribute('smooth-bob');
                l5Plane.setAttribute('position', '0 0 -2.20');

                const l6Plane = targetEl.querySelector('.l6');
                l6Plane.removeAttribute('evil-glitch');
                l6Plane.setAttribute('opacity', 1);

                if (sfxEvilLaugh) { sfxEvilLaugh.pause(); }

                sharedL7Vid.muted = false;
            });
        };

        window.addEventListener('load', () => Object.keys(COLLECTION_DATA).forEach(index => setupTarget(index)));

        sceneEl.addEventListener("arReady", () => {
            document.getElementById('loading-container').style.visibility = 'hidden'; 
            document.getElementById('logo-container').classList.add('animate-sweep');
            document.getElementById('main-logo').classList.add('animate-logo');
            setTimeout(() => { startBtn.classList.add('visible'); }, 3000);
        });

        startBtn.addEventListener('click', () => {
            if (navigator.vibrate) navigator.vibrate(50);
            if (sfxStart) sfxStart.play();
            if (sfxStartup) setTimeout(() => sfxStartup.play(), 2000);
            
            if (sfxSiren) { sfxSiren.play().then(() => sfxSiren.pause()).catch(e=>{}); }
            if (sfxEvilLaugh) { sfxEvilLaugh.play().then(() => sfxEvilLaugh.pause()).catch(e=>{}); }
            sharedL7Vid.play().then(() => sharedL7Vid.pause()).catch(e=>{});
            sharedWildcardVid.play().then(() => sharedWildcardVid.pause()).catch(e=>{});
            
            startScreen.classList.add('hidden');
            overlay.classList.add('visible'); 
            scannerUi.classList.add('visible');
            ['help-btn', 'cta-btn', 'share-btn', 'info-btn', 'flash-btn'].forEach(id => document.getElementById(id).classList.add('visible'));
            isStarted = true;
        });

        let touchPoints = [];
        let isDrawing = false;
        let easterEggTaps = [];
        let isEasterEggRunning = false;

        const handleCenterTap = (clientX, clientY) => {
            if (!isStarted || isEasterEggRunning || activeTargetIndex !== null) return;
            
            const cx = window.innerWidth / 2;
            const cy = window.innerHeight / 2;
            const halfScannerWidth = window.innerWidth * 0.3; 
            
            if (Math.abs(clientX - cx) <= halfScannerWidth && Math.abs(clientY - cy) <= halfScannerWidth) {
                const now = Date.now();
                easterEggTaps.push(now);
                easterEggTaps = easterEggTaps.filter(t => now - t <= 3000);
                
                if (easterEggTaps.length >= 9) {
                    easterEggTaps = []; 
                    triggerEasterEgg();
                }
            }
        };

        function triggerEasterEgg() {
            isEasterEggRunning = true;
            if (navigator.vibrate) navigator.vibrate([200, 100, 200, 100, 500]);
            const eggOverlay = document.getElementById('easter-egg-overlay');
            eggOverlay.classList.add('active');
            
            setTimeout(() => {
                eggOverlay.classList.remove('active');
                isEasterEggRunning = false;
            }, 6000);
        }

        window.addEventListener('pointerdown', (e) => {
            if (!isStarted) return;
            handleCenterTap(e.clientX, e.clientY);

            if (activeTargetIndex === null || isWildcardSequenceRunning) return;
            isDrawing = true;
            touchPoints = [{x: e.clientX, y: e.clientY}];
        });

        window.addEventListener('pointermove', (e) => {
            if (!isDrawing) return;
            touchPoints.push({x: e.clientX, y: e.clientY});
        });

        window.addEventListener('pointerup', () => {
            if (!isDrawing) return;
            isDrawing = false;
            
            if (analyzeGesture(touchPoints)) {
                initiateWildcardSequence(activeTargetIndex);
            }
        });

        function analyzeGesture(pts) {
            if (pts.length < 20) return false; 
            let cx = 0, cy = 0;
            pts.forEach(p => { cx += p.x; cy += p.y; });
            cx /= pts.length; cy /= pts.length;

            let totalAngle = 0;
            let prevAngle = Math.atan2(pts[0].y - cy, pts[0].x - cx);

            for (let i = 1; i < pts.length; i++) {
                let angle = Math.atan2(pts[i].y - cy, pts[i].x - cx);
                let delta = angle - prevAngle;
                if (delta > Math.PI) delta -= 2 * Math.PI;
                if (delta < -Math.PI) delta += 2 * Math.PI;
                totalAngle += delta;
                prevAngle = angle;
            }
            return Math.abs(totalAngle) > (3.5 * Math.PI);
        }

        function initiateWildcardSequence(targetIndex) {
            const data = COLLECTION_DATA[targetIndex];
            if (!data) return;

            isWildcardSequenceRunning = true; 

            if (navigator.vibrate) navigator.vibrate([100, 50, 100]); 
            const feedback = document.getElementById('gesture-feedback');
            feedback.style.opacity = '1';
            setTimeout(() => feedback.style.opacity = '0', 3000);

            const activeWildcardPlane = document.querySelector(`#target-${targetIndex} .wildcard-layer`);
            activeWildcardPlane.setAttribute('width', data.wildcardW);
            activeWildcardPlane.setAttribute('height', data.wildcardH);
            activeWildcardPlane.setAttribute('position', `0 0 ${data.wildcardZ}`);

            const randomVidNum = Math.floor(Math.random() * data.count) + 1;
            sharedWildcardVid.src = `videos/wildcards/${data.wildcardPrefix}${randomVidNum}.mp4`;
            activeWildcardPlane.setAttribute('src', '#shared-wildcard-vid');
            
            sharedWildcardVid.muted = false; 
            const playPromise = sharedWildcardVid.play();
            if (playPromise !== undefined) {
                playPromise.then(() => {
                    sharedWildcardVid.pause(); 
                }).catch(e => console.log("Unlock handled gracefully"));
            }

            if (data.designLogic === 'cyberpunk') {
                const l3Plane = document.querySelector(`#target-${targetIndex} .l3`);
                l3Plane.removeAttribute('animation__hover');
                l3Plane.setAttribute('animation', 'property: position; to: -3.5 0 -1.60; dur: 800; easing: easeInOutQuad');
                setTimeout(() => finalizeWildcard(data), 800);
            } 
            else if (data.designLogic === 'containment') {
                const l2Plane = document.querySelector(`#target-${targetIndex} .l2`);
                const l3Plane = document.querySelector(`#target-${targetIndex} .l3`);
                const l4Plane = document.querySelector(`#target-${targetIndex} .l4`);
                const l6Plane = document.querySelector(`#target-${targetIndex} .l6`);

                l6Plane.setAttribute('evil-glitch', 'active: false');
                if (sfxEvilLaugh) sfxEvilLaugh.muted = true;

                l2Plane.setAttribute('animation__color', 'property: components.material.material.color; type: color; to: #ff0000; dur: 800');
                l2Plane.setAttribute('animation__op', 'property: material.opacity; to: 0; dur: 800');
                l3Plane.setAttribute('animation__color', 'property: components.material.material.color; type: color; to: #ff0000; dur: 800');
                l3Plane.setAttribute('animation__op', 'property: material.opacity; to: 0; dur: 800');

                setTimeout(() => {
                    l4Plane.setAttribute('animation__scale', 'property: scale; to: 2 2 2; dur: 800; easing: easeInOutQuad');
                    setTimeout(() => finalizeWildcard(data), 800);
                }, 800);
            }
            else {
                finalizeWildcard(data);
            }
        }

        function finalizeWildcard(data) {
            if (!isWildcardSequenceRunning) return; 

            if (sharedL7Vid) sharedL7Vid.muted = true;
            document.querySelector(`#target-${activeTargetIndex} .wildcard-layer`).setAttribute('visible', true);
            
            sharedWildcardVid.play().catch(e => { 
                sharedWildcardVid.muted = true; 
                sharedWildcardVid.play(); 
            });
        }
    </script>
</body>
</html>
